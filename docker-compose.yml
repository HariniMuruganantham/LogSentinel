services:

  localstack:
    image: localstack/localstack-pro:latest
    container_name: p1-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=logs,cloudwatch,ec2,cloudcontrol
      - DEBUG=0
      - LOCALSTACK_HOST=localstack
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      - ./scripts/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - p1-net

  auth-svc:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: p1-auth
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - PORT=5001
    ports:
      - "5001:5001"
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - p1-net

  payment-svc:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    container_name: p1-payment
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - PORT=5002
    ports:
      - "5002:5002"
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - p1-net

  inventory-svc:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    container_name: p1-inventory
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - PORT=5003
    ports:
      - "5003:5003"
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - p1-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: p1-backend
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AUTH_URL=http://auth-svc:5001
      - PAYMENT_URL=http://payment-svc:5002
      - INVENTORY_URL=http://inventory-svc:5003
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8001:8000"
    depends_on:
      auth-svc:
        condition: service_healthy
      payment-svc:
        condition: service_healthy
      inventory-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - p1-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: p1-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - p1-net

volumes:
  localstack-data:

networks:
  p1-net:
    driver: bridge